<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta author='Karyn Nakamura'>
  <title>Karyn</title>
  <meta name="viewport" content="initial-scale=1" />
  <link rel="icon" href="folder.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

    .desktopimg {
      height: 100vh;
      width: 100vw;
      object-fit: cover;
      position: fixed;
      top: 0; left: 0;
      z-index: 0;
    }

    #media-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 5;
      pointer-events: none;
    }

    /* Preview windows in media layer */
    .preview-window {
      position: absolute;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(0,0,0,0.3);
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.25s cubic-bezier(0.2, 0, 0.13, 1), transform 0.25s cubic-bezier(0.2, 0, 0.13, 1);
      pointer-events: auto;
    }
    .preview-window.visible { opacity: 1; transform: scale(1); }
    .preview-window.closing { opacity: 0; transform: scale(0.5); }
    .preview-window .titlebar {
      background: linear-gradient(180deg, #e8e6e8 0%, #d4d2d4 100%);
      height: 22px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      border-bottom: 1px solid #b0aeb0;
      position: relative;
      cursor: grab;
    }
    .preview-window .titlebar:active { cursor: grabbing; }
    .preview-window .titlebar .traffic-lights {
      display: flex;
      gap: 5px;
    }
    .preview-window .titlebar .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .preview-window .titlebar-text {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #4d4d4d;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60%;
    }
    .preview-window .preview-body {
      background: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-window .preview-body img,
    .preview-window .preview-body video {
      display: block;
      max-width: 560px;
      max-height: 440px;
      min-width: 300px;
      min-height: 200px;
      width: auto;
      height: auto;
    }
    .preview-window.link-window .titlebar {
      height: 28px;
      padding: 0 8px;
    }
    .preview-window.link-window .titlebar .traffic-lights {
      flex-shrink: 0;
    }
    .preview-window.link-window .link-title {
      margin-left: 8px;
      font-size: 12px;
      color: #333;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .preview-window.link-window .url-row {
      background: linear-gradient(180deg, #d4d2d4 0%, #c8c6c8 100%);
      padding: 4px 8px;
      border-bottom: 1px solid #b0aeb0;
    }
    .preview-window.link-window .url-bar {
      display: block;
      background: #fff;
      border: 1px solid #c0bec0;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      color: #1a6be8;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 20px;
    }
    .preview-window.link-window .url-bar:hover {
      text-decoration: underline;
    }
    .preview-window.link-window .preview-body {
      background: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-window.link-window .preview-body iframe {
      display: block;
      width: 560px;
      height: 315px;
      border: none;
    }

    #textedit-window {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 520px;
      z-index: 10;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(0,0,0,0.3);
    }

    .titlebar {
      background: linear-gradient(180deg, #e8e6e8 0%, #d4d2d4 100%);
      height: 28px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      border-bottom: 1px solid #b0aeb0;
      position: relative;
      cursor: grab;
    }
    .titlebar:active { cursor: grabbing; }

    .traffic-lights {
      display: flex;
      gap: 6px;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .dot-red { background: #ff5f57; border: 0.5px solid #e0443e; cursor: pointer; }
    .dot-yellow { background: #febc2e; border: 0.5px solid #dea123; }
    .dot-green { background: #28c840; border: 0.5px solid #1aab29; }

    .titlebar-text {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: #4d4d4d;
      font-weight: 400;
    }

    .window-body {
      background: #fff;
      padding: 24px 28px;
      max-height: 70vh;
      overflow-y: auto;
      line-height: 1.65;
      font-size: 13.5px;
      color: #333;
    }

    .window-body p {
      margin-bottom: 14px;
    }

    .window-body p:last-child {
      margin-bottom: 0;
    }

    .trigger {
      text-decoration: underline;
      text-decoration-style: dotted;
      text-underline-offset: 3px;
      text-decoration-color: #999;
      cursor: default;
      border-radius: 2px;
      padding: 1px 0;
    }
    .trigger:hover {
      background: #3b82f6;
      color: #fff;
      text-decoration: none;
    }
    .trigger.pinned {
      background: #3b82f6;
      color: #fff;
      text-decoration: none;
    }

  </style>
  <link href="https://fonts.googleapis.com/css2?family=Quantico&display=swap" rel="stylesheet">
</head>
<body>

  <img class="desktopimg" src="desktop.png">

  <div id="media-layer"></div>

  <div id="textedit-window">
    <div class="titlebar">
      <div class="traffic-lights">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
      </div>
      <span class="titlebar-text">life.txt</span>
    </div>
    <div class="window-body" id="prose-body"></div>
  </div>


<script>
let MEDIA_MAP = {};

const MEDIA_BASE = location.hostname === 'localhost'
  ? 'life/media'
  : 'https://pub-b7ebf6c174c84f2482debf3f183947b8.r2.dev/web_media';

const VIDEO_EXTS = ['.mov','.mp4','.MOV','.MP4'];

function isVideo(filename) {
  return VIDEO_EXTS.some(ext => filename.endsWith(ext));
}

function isLink(entry) {
  return entry.type === 'link';
}

function parseCSV(text) {
  const map = {};
  const lines = text.split('\n').slice(1); // skip header
  for (const line of lines) {
    if (!line.trim()) continue;
    // Handle quoted values (for filenames with commas)
    const match = line.match(/^(\d+),(file|link),(".*"|.*)$/);
    if (!match) continue;
    const folder = parseInt(match[1]);
    const type = match[2];
    const value = match[3].replace(/^"|"$/g, '');
    if (!map[folder]) map[folder] = [];
    map[folder].push({ type, value });
  }
  return map;
}

// Load media map then life.txt
fetch('life/media-map.csv')
  .then(r => r.text())
  .then(csv => {
    MEDIA_MAP = parseCSV(csv);
    return fetch('life/life.txt');
  })
  .then(r => r.text())
  .then(text => {
    renderProse(text);
    bindTriggers();
  });

function renderProse(text) {
  const proseBody = document.getElementById('prose-body');
  const paragraphs = text.split(/\n\n+/);

  paragraphs.forEach(para => {
    if (!para.trim()) return;
    const p = document.createElement('p');
    const html = para.replace(/\[(\d+)\](.*?)\[\/\1\]/g, function(match, num, phrase) {
      const folder = parseInt(num);
      if (!MEDIA_MAP[folder] || MEDIA_MAP[folder].length === 0) {
        return phrase;
      }
      return '<span class="trigger" data-folder="' + folder + '">' + phrase + '</span>';
    });
    p.innerHTML = html;
    proseBody.appendChild(p);
  });
}

const mediaLayer = document.getElementById('media-layer');

let topZ = 20;
function bringToFront(el) {
  topZ++;
  el.style.zIndex = topZ;
}

// Dragging logic
function makeDraggable(el, handleSelector) {
  const handle = handleSelector ? el.querySelector(handleSelector) : el;
  let dragging = false, startX, startY, origX, origY;

  handle.addEventListener('mousedown', function(e) {
    if (e.target.closest('.traffic-lights')) return;
    bringToFront(el);
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    const rect = el.getBoundingClientRect();
    origX = rect.left;
    origY = rect.top;
    el.style.transform = 'none';
    el.style.left = origX + 'px';
    el.style.top = origY + 'px';
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    e.preventDefault();
  });

  function onMove(e) {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    el.style.left = (origX + dx) + 'px';
    el.style.top = (origY + dy) + 'px';
  }

  function onUp() {
    dragging = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
}

// Make textedit window draggable
makeDraggable(document.getElementById('textedit-window'), '.titlebar');

// Scatter positions
const ITEM_W = 560;
const ITEM_H = 470;

function getScatterPositions(count, windowRect) {
  const pad = 30;
  const ex = {
    left: windowRect.left - pad,
    right: windowRect.right + pad,
    top: windowRect.top - pad,
    bottom: windowRect.bottom + pad
  };

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const zones = [
    { x1: 0, y1: 0, x2: ex.left - ITEM_W, y2: vh - ITEM_H },
    { x1: ex.right, y1: 0, x2: vw - ITEM_W, y2: vh - ITEM_H },
    { x1: 0, y1: 0, x2: vw - ITEM_W, y2: ex.top - ITEM_H },
    { x1: 0, y1: ex.bottom, x2: vw - ITEM_W, y2: vh - ITEM_H }
  ].filter(z => z.x2 > z.x1 && z.y2 > z.y1);

  if (zones.length === 0) {
    zones.push({ x1: 0, y1: 0, x2: Math.max(0, vw - ITEM_W), y2: Math.max(0, vh - ITEM_H) });
  }

  const positions = [];

  for (let i = 0; i < count; i++) {
    let placed = false;
    for (let attempt = 0; attempt < 50; attempt++) {
      const zone = zones[Math.floor(Math.random() * zones.length)];
      const x = zone.x1 + Math.random() * (zone.x2 - zone.x1);
      const y = zone.y1 + Math.random() * (zone.y2 - zone.y1);

      const overlaps = positions.some(p => {
        const overlapX = Math.max(0, Math.min(x + ITEM_W, p.x + ITEM_W) - Math.max(x, p.x));
        const overlapY = Math.max(0, Math.min(y + ITEM_H, p.y + ITEM_H) - Math.max(y, p.y));
        const overlapArea = overlapX * overlapY;
        return overlapArea / (ITEM_W * ITEM_H) > 0.6;
      });

      if (!overlaps) {
        positions.push({ x, y });
        placed = true;
        break;
      }
    }
    if (!placed) {
      const zone = zones[Math.floor(Math.random() * zones.length)];
      positions.push({
        x: zone.x1 + Math.random() * (zone.x2 - zone.x1),
        y: zone.y1 + Math.random() * (zone.y2 - zone.y1)
      });
    }
  }
  return positions;
}

function createPreviewWindow(file, folder, pos, delay) {
  delay = delay || 0;
  const src = MEDIA_BASE + '/' + folder + '/' + encodeURIComponent(file);

  const win = document.createElement('div');
  win.className = 'preview-window';
  win.dataset.folder = folder;
  win.style.left = pos.x + 'px';
  win.style.top = pos.y + 'px';

  const tb = document.createElement('div');
  tb.className = 'titlebar';
  tb.innerHTML = '<div class="traffic-lights"><div class="dot dot-red"></div><div class="dot dot-yellow"></div><div class="dot dot-green"></div></div><span class="titlebar-text">' + file + '</span>';
  win.appendChild(tb);

  const body = document.createElement('div');
  body.className = 'preview-body';

  if (isVideo(file)) {
    const mediaEl = document.createElement('video');
    mediaEl.src = src;
    mediaEl.autoplay = true;
    mediaEl.muted = true;
    mediaEl.loop = true;
    mediaEl.playsInline = true;
    body.appendChild(mediaEl);
  } else {
    const mediaEl = document.createElement('img');
    mediaEl.src = src;
    body.appendChild(mediaEl);
  }

  win.appendChild(body);
  mediaLayer.appendChild(win);

  makeDraggable(win, '.titlebar');

  win.querySelector('.dot-red').addEventListener('click', function(e) {
    e.stopPropagation();
    win.classList.remove('visible');
    win.classList.add('closing');
    win.addEventListener('transitionend', () => {
      const vid = win.querySelector('video');
      if (vid) vid.pause();
      win.remove();
    }, { once: true });
    setTimeout(() => { if (win.parentNode) win.remove(); }, 400);
  });

  setTimeout(() => {
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        win.classList.add('visible');
      });
    });
  }, delay);

  return win;
}

function getEmbedUrl(url) {
  // YouTube
  let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
  if (m) return 'https://www.youtube.com/embed/' + m[1];
  // Vimeo
  m = url.match(/vimeo\.com\/(\d+)/);
  if (m) return 'https://player.vimeo.com/video/' + m[1];
  return null;
}

function createLinkWindow(url, folder, pos, delay) {
  delay = delay || 0;

  const win = document.createElement('div');
  win.className = 'preview-window link-window';
  win.dataset.folder = folder;
  win.style.left = pos.x + 'px';
  win.style.top = pos.y + 'px';

  let displayUrl = url;
  let hostname = url;
  try {
    const u = new URL(url);
    displayUrl = u.hostname + u.pathname;
    hostname = u.hostname;
  } catch(e) {}

  // Titlebar with traffic lights + page title
  const tb = document.createElement('div');
  tb.className = 'titlebar';
  tb.innerHTML = '<div class="traffic-lights"><div class="dot dot-red"></div><div class="dot dot-yellow"></div><div class="dot dot-green"></div></div>';
  const titleSpan = document.createElement('span');
  titleSpan.className = 'link-title';
  titleSpan.textContent = hostname; // fallback, replaced when title loads
  tb.appendChild(titleSpan);
  win.appendChild(tb);

  // Try to fetch page title
  fetch('https://corsproxy.io/?' + encodeURIComponent(url))
    .then(r => r.text())
    .then(html => {
      const m = html.match(/<title[^>]*>([^<]+)<\/title>/i);
      if (m) titleSpan.textContent = m[1].trim();
    })
    .catch(() => {});

  // URL bar row
  const urlRow = document.createElement('div');
  urlRow.className = 'url-row';
  const urlBar = document.createElement('a');
  urlBar.className = 'url-bar';
  urlBar.href = url;
  urlBar.target = '_blank';
  urlBar.textContent = displayUrl;
  urlRow.appendChild(urlBar);
  win.appendChild(urlRow);

  const embedUrl = getEmbedUrl(url);
  if (embedUrl) {
    const body = document.createElement('div');
    body.className = 'preview-body';
    const iframe = document.createElement('iframe');
    iframe.src = embedUrl;
    iframe.setAttribute('allow', 'autoplay; encrypted-media');
    iframe.setAttribute('allowfullscreen', '');
    body.appendChild(iframe);
    win.appendChild(body);
  }

  mediaLayer.appendChild(win);

  makeDraggable(win, '.titlebar');

  win.querySelector('.dot-red').addEventListener('click', function(e) {
    e.stopPropagation();
    win.classList.remove('visible');
    win.classList.add('closing');
    win.addEventListener('transitionend', () => win.remove(), { once: true });
    setTimeout(() => { if (win.parentNode) win.remove(); }, 400);
  });

  setTimeout(() => {
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        win.classList.add('visible');
      });
    });
  }, delay);

  return win;
}

// Track pinned and hovered state
const pinnedFolders = new Set();

function dismissFolder(folder) {
  const items = mediaLayer.querySelectorAll('.preview-window[data-folder="' + folder + '"]');
  items.forEach(el => {
    el.classList.remove('visible');
    el.classList.add('closing');
    el.addEventListener('transitionend', () => {
      const vid = el.querySelector('video');
      if (vid) vid.pause();
      el.remove();
    }, { once: true });
    setTimeout(() => { if (el.parentNode) el.remove(); }, 400);
  });
}

function spawnFolder(folder) {
  const entries = MEDIA_MAP[folder];
  if (!entries || entries.length === 0) return;

  const winEl = document.getElementById('textedit-window');
  const rect = winEl.getBoundingClientRect();
  const positions = getScatterPositions(entries.length, rect);

  entries.forEach((entry, idx) => {
    if (entry.type === 'link') {
      createLinkWindow(entry.value, folder, positions[idx], idx * 120);
    } else {
      createPreviewWindow(entry.value, folder, positions[idx], idx * 120);
    }
  });
}

function bindTriggers() {
  document.querySelectorAll('.trigger').forEach(span => {
    span.addEventListener('mouseenter', function() {
      const folder = this.dataset.folder;
      if (pinnedFolders.has(folder)) return;
      spawnFolder(folder);
    });

    span.addEventListener('mouseleave', function() {
      const folder = this.dataset.folder;
      if (pinnedFolders.has(folder)) return;
      dismissFolder(folder);
    });

    span.addEventListener('click', function() {
      const folder = this.dataset.folder;
      const files = MEDIA_MAP[folder];
      if (!files || files.length === 0) return;

      if (pinnedFolders.has(folder)) {
        pinnedFolders.delete(folder);
        document.querySelectorAll('.trigger[data-folder="' + folder + '"]').forEach(t => t.classList.remove('pinned'));
        dismissFolder(folder);
      } else {
        pinnedFolders.add(folder);
        document.querySelectorAll('.trigger[data-folder="' + folder + '"]').forEach(t => t.classList.add('pinned'));
        if (!mediaLayer.querySelector('.preview-window[data-folder="' + folder + '"]')) {
          spawnFolder(folder);
        }
      }
    });
  });
}
</script>
</body>
</html>
