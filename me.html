  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

    .desktopimg {

      </div>

<script>
let MEDIA_MAP = {};

const MEDIA_BASE = 'https://media.karynnakamura.com/web_media';

const VIDEO_EXTS = ['.mov','.mp4','.MOV','.MP4'];

function isVideo(filename) {
  return VIDEO_EXTS.some(ext => filename.endsWith(ext));
}

function isLink(entry) {
  return entry.type === 'link';
}

function parseCSV(text) {
  const map = {};
  const lines = text.split('\n').slice(1); // skip header
  for (const line of lines) {
    if (!line.trim()) continue;
    // Handle quoted values (for filenames with commas)
    const match = line.match(/^(\d+),(file|link|linkimg|linkvideo|project),(".*"|[^,]*),?(.*)$/);
    if (!match) continue;
    const folder = parseInt(match[1]);
    const type = match[2];
    const value = match[3].replace(/^"|"$/g, '');
    const extra = (match[4] || '').trim();
    if (!map[folder]) map[folder] = [];
    map[folder].push({ type, value, extra });
  }
  return map;
}

// Load media map then me.txt
fetch('media-map.csv')
  .then(r => r.text())
  .then(csv => {
    MEDIA_MAP = parseCSV(csv);
    return fetch('me.txt');
  })
  .then(r => r.text())
  .then(text => {
    renderProse(text);
    bindTriggers();
  });

function annotateLine(text) {
  return text.replace(/\[(\d+)\](.*?)\[\/\1\]/g, function(match, num, phrase) {
    const folder = parseInt(num);
    if (!MEDIA_MAP[folder] || MEDIA_MAP[folder].length === 0) {
      return phrase;
    }
    return '<span class="trigger" data-folder="' + folder + '">' + phrase + '</span>';
  });
}

function renderProse(text) {
  const proseBody = document.getElementById('prose-body');
  const paragraphs = text.split(/\n\n+/);

  paragraphs.forEach(para => {
    if (!para.trim()) return;

    // Check if this paragraph is a dash list item
    if (para.trim().startsWith('- ')) {
      // Could be a single bullet — check if previous sibling is a ul to append to
      const lastChild = proseBody.lastElementChild;
      let ul;
      if (lastChild && lastChild.tagName === 'UL') {
        ul = lastChild;
      } else {
        ul = document.createElement('ul');
        proseBody.appendChild(ul);
      }
      const li = document.createElement('li');
      const lines = para.trim().slice(2).split('\n');
      let liHTML = annotateLine(lines[0]);
      for (let i = 1; i < lines.length; i++) {
        const creditText = lines[i].trim();
        if (creditText) liHTML += '<span class="credit">' + annotateLine(creditText) + '</span>';
      }
      li.innerHTML = liHTML;
      ul.appendChild(li);
    } else {
      // Check if previous paragraph ended with ':'
      const lastEl = proseBody.lastElementChild;
      const prevText = lastEl ? lastEl.textContent || '' : '';
      if (lastEl && prevText.trim().endsWith(':')) {
        const p = document.createElement('p');
        p.className = 'credit-block';
        p.innerHTML = annotateLine(para);
        proseBody.appendChild(p);
      } else {
        const p = document.createElement('p');
        p.innerHTML = annotateLine(para);
        proseBody.appendChild(p);
      }
    }
  });
}

const mediaLayer = document.getElementById('media-layer');

let topZ = 20;
function bringToFront(el) {
  topZ++;
  el.style.zIndex = topZ;
}

// Dragging logic
function makeDraggable(el, handleSelector) {
  const handle = handleSelector ? el.querySelector(handleSelector) : el;
  let dragging = false, startX, startY, origX, origY;

  handle.addEventListener('mousedown', function(e) {
    if (e.target.closest('.traffic-lights')) return;
    bringToFront(el);
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    const rect = el.getBoundingClientRect();
    origX = rect.left;
    origY = rect.top;
    el.style.transform = 'none';
    el.style.left = origX + 'px';
    el.style.top = origY + 'px';
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    e.preventDefault();
  });

  function onMove(e) {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    let newX = origX + dx;
    let newY = origY + dy;
    // Clamp to screen bounds
    const w = el.offsetWidth;
    const h = el.offsetHeight;
    newX = Math.max(0, Math.min(newX, window.innerWidth - w));
    newY = Math.max(0, Math.min(newY, window.innerHeight - h));
    el.style.left = newX + 'px';
    el.style.top = newY + 'px';
  }

  function onUp() {
    dragging = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
}

// Make textedit window draggable
makeDraggable(document.getElementById('textedit-window'), '.titlebar');
makeDraggable(document.getElementById('press-window'), '.titlebar');

// Make finder window draggable
makeDraggable(document.getElementById('finder-frame-window'), '.titlebar');
// Toggle finder window via red/yellow dots and folder icon
function toggleFinder() {
  const fw = document.getElementById('finder-frame-window');
  if (fw.style.display === 'none') {
    fw.style.display = '';
    bringToFront(fw);
  } else {
    fw.style.display = 'none';
  }
}
document.getElementById('finder-close').addEventListener('click', toggleFinder);
document.querySelector('#finder-frame-window .dot-yellow').addEventListener('click', toggleFinder);
document.getElementById('finder-minimized').addEventListener('click', toggleFinder);

// Custom resize grips
function makeResizable(el) {
  const grip = el.querySelector('.resize-grip');
  if (!grip) return;
  let resizing = false, startX, startY, startW, startH;

  grip.addEventListener('mousedown', function(e) {
    e.stopPropagation();
    e.preventDefault();
    resizing = true;
    startX = e.clientX;
    startY = e.clientY;
    startW = el.offsetWidth;
    startH = el.offsetHeight;
    // Fix position before resizing
    const rect = el.getBoundingClientRect();
    el.style.transform = 'none';
    el.style.left = rect.left + 'px';
    el.style.top = rect.top + 'px';
    // Cover iframe during resize
    const overlay = document.createElement('div');
    overlay.id = 'resize-overlay';
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:99999;cursor:nwse-resize;';
    document.body.appendChild(overlay);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  function onMove(e) {
    if (!resizing) return;
    const w = Math.max(parseInt(el.style.minWidth) || 300, startW + (e.clientX - startX));
    const h = Math.max(parseInt(el.style.minHeight) || 200, startH + (e.clientY - startY));
    el.style.width = w + 'px';
    el.style.height = h + 'px';
  }

  function onUp() {
    resizing = false;
    const overlay = document.getElementById('resize-overlay');
    if (overlay) overlay.remove();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
}

makeResizable(document.getElementById('textedit-window'));
makeResizable(document.getElementById('press-window'));
makeResizable(document.getElementById('finder-frame-window'));

// Scatter positions
const ITEM_W = 560;
const ITEM_H = 470;
const IMAGE_THUMB_W = 110;
const IMAGE_THUMB_H = 90;
const IMAGE_WINDOW_H = 112;
const LINKIMG_WINDOW_H = 150;

function getEntryScatterSize(entry) {
  if (entry.type === 'linkimg') {
    return { w: IMAGE_THUMB_W, h: LINKIMG_WINDOW_H };
  }
  if (entry.type === 'file' && !isVideo(entry.value)) {
    return { w: IMAGE_THUMB_W, h: IMAGE_WINDOW_H };
  }
  return { w: ITEM_W, h: ITEM_H };
}

function getScatterPosition(existing, windowRect, itemW, itemH) {
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  let zones;
  if (isMobile()) {
    // On mobile, scatter in the top half only
    const halfH = vh * 0.5;
    const mobileItemW = Math.min(itemW, vw * 0.85);
    const mobileItemH = Math.min(itemH, halfH * 0.8);
    zones = [
      { x1: 0, y1: 0, x2: Math.max(0, vw - mobileItemW), y2: Math.max(0, halfH - mobileItemH) }
    ];
  } else {
    const pad = -60;
    const ex = {
      left: windowRect.left + pad,
      right: windowRect.right - pad,
      top: windowRect.top + pad,
      bottom: windowRect.bottom - pad
    };

    zones = [
      { x1: 0, y1: 0, x2: ex.left - itemW, y2: vh - itemH },
      { x1: ex.right, y1: 0, x2: vw - itemW, y2: vh - itemH },
      { x1: 0, y1: 0, x2: vw - itemW, y2: ex.top - itemH },
      { x1: 0, y1: ex.bottom, x2: vw - itemW, y2: vh - itemH }
    ].filter(z => z.x2 > z.x1 && z.y2 > z.y1);
  }

  if (zones.length === 0) {
    zones.push({ x1: 0, y1: 0, x2: Math.max(0, vw - itemW), y2: Math.max(0, vh - itemH) });
  }

  for (let attempt = 0; attempt < 50; attempt++) {
    const zone = zones[Math.floor(Math.random() * zones.length)];
    const x = zone.x1 + Math.random() * (zone.x2 - zone.x1);
    const y = zone.y1 + Math.random() * (zone.y2 - zone.y1);

    const overlaps = existing.some(p => {
      const overlapX = Math.max(0, Math.min(x + itemW, p.x + p.w) - Math.max(x, p.x));
      const overlapY = Math.max(0, Math.min(y + itemH, p.y + p.h) - Math.max(y, p.y));
      const overlapArea = overlapX * overlapY;
      const smallerArea = Math.min(itemW * itemH, p.w * p.h);
      return smallerArea > 0 && overlapArea / smallerArea > 0.6;
    });

    if (!overlaps) {
      return { x, y };
    }
  }

  const zone = zones[Math.floor(Math.random() * zones.length)];
  return {
    x: zone.x1 + Math.random() * (zone.x2 - zone.x1),
    y: zone.y1 + Math.random() * (zone.y2 - zone.y1)
  };
}

function getScatterPositions(count, windowRect, itemW = ITEM_W, itemH = ITEM_H) {
  const positions = [];
  for (let i = 0; i < count; i++) {
    const pos = getScatterPosition(positions, windowRect, itemW, itemH);
    positions.push({ ...pos, w: itemW, h: itemH });
  }
  return positions.map(({ x, y }) => ({ x, y }));
}

function finalizePreviewWindow(win, delay) {
  mediaLayer.appendChild(win);

  makeDraggable(win);

  win.querySelector('.dot-red').addEventListener('click', function(e) {
    e.stopPropagation();
    win.classList.remove('visible');
    win.classList.add('closing');
    win.addEventListener('transitionend', () => {
      const vid = win.querySelector('video');
      if (vid) vid.pause();
      win.remove();
    }, { once: true });
    setTimeout(() => { if (win.parentNode) win.remove(); }, 400);
  });

  setTimeout(() => {
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        bringToFront(win);
        win.classList.add('visible');
      });
    });
  }, delay);

  return win;
}

function createPreviewWindow(file, folder, pos, delay) {
  delay = delay || 0;
  const src = MEDIA_BASE + '/' + folder + '/' + encodeURIComponent(file);

  const win = document.createElement('div');
  win.className = 'preview-window';
  win.dataset.folder = folder;
  win.style.left = pos.x + 'px';
  win.style.top = pos.y + 'px';

  const tb = document.createElement('div');
  tb.className = 'titlebar';
  tb.innerHTML = '<div class="traffic-lights"><div class="dot dot-red"></div><div class="dot dot-yellow"></div><div class="dot dot-green"></div></div><span class="titlebar-text">' + file + '</span>';
  win.appendChild(tb);

  const body = document.createElement('div');
  body.className = 'preview-body';

  if (isVideo(file)) {
    const mediaEl = document.createElement('video');
    mediaEl.src = src;
    mediaEl.autoplay = true;
    mediaEl.muted = true;
    mediaEl.loop = true;
    mediaEl.playsInline = true;
    body.appendChild(mediaEl);
  } else {
    body.classList.add('preview-thumb');
    win.style.width = '110px';
    const mediaEl = document.createElement('img');
    mediaEl.src = src;
    mediaEl.addEventListener('load', function() {
      body.appendChild(mediaEl);
      win.appendChild(body);
      finalizePreviewWindow(win, delay);
    });
    mediaEl.addEventListener('error', function() {
      win.remove();
    });
    return win;
  }

  win.appendChild(body);
  return finalizePreviewWindow(win, delay);
}

function getEmbedUrl(url) {
  // YouTube
  let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
  if (m) return 'https://www.youtube.com/embed/' + m[1] + '?autoplay=1&mute=1';
  // Vimeo (with optional privacy hash)
  m = url.match(/vimeo\.com\/(\d+)(?:\/([a-f0-9]+))?/);
  if (m) {
    let embedUrl = 'https://player.vimeo.com/video/' + m[1] + '?autoplay=1&muted=1&loop=1&background=1';
    if (m[2]) embedUrl += '&h=' + m[2];
    // Preserve timestamp
    const t = url.match(/#t=(\d+s?)/);
    if (t) embedUrl += '#t=' + t[1];
    return embedUrl;
  }
  return null;
}

function createLinkWindow(url, folder, pos, delay, coverImage, embedVideo) {
  delay = delay || 0;

  const win = document.createElement('div');
  win.className = 'preview-window link-window';
  win.dataset.folder = folder;
  win.style.left = pos.x + 'px';
  win.style.top = pos.y + 'px';

  let displayUrl = url;
  let hostname = url;
  try {
    const u = new URL(url);
    displayUrl = u.hostname + u.pathname;
    hostname = u.hostname;
  } catch(e) {}

  // Titlebar with traffic lights + page title
  const tb = document.createElement('div');
  tb.className = 'titlebar';
  tb.innerHTML = '<div class="traffic-lights"><div class="dot dot-red"></div><div class="dot dot-yellow"></div><div class="dot dot-green"></div></div>';
  const titleSpan = document.createElement('span');
  titleSpan.className = 'link-title';
  titleSpan.textContent = hostname; // fallback, replaced when title loads
  tb.appendChild(titleSpan);
  win.appendChild(tb);

  // Try to fetch page title
  fetch('https://corsproxy.io/?' + encodeURIComponent(url))
    .then(r => r.text())
    .then(html => {
      const m = html.match(/<title[^>]*>([^<]+)<\/title>/i);
      if (m) titleSpan.textContent = m[1].trim();
    })
    .catch(() => {});

  // URL bar row
  const urlRow = document.createElement('div');
  urlRow.className = 'url-row';
  const urlBar = document.createElement('a');
  urlBar.className = 'url-bar';
  urlBar.href = url;
  urlBar.target = '_blank';
  urlBar.textContent = displayUrl;
  urlRow.appendChild(urlBar);
  win.appendChild(urlRow);

  if (coverImage) {
    const body = document.createElement('div');
    body.className = 'preview-body preview-thumb';
    win.style.width = '110px';
    const img = document.createElement('img');
    img.src = MEDIA_BASE + '/' + folder + '/' + encodeURIComponent(coverImage);
    body.addEventListener('click', () => window.open(url, '_blank'));
    img.addEventListener('load', function() {
      body.appendChild(img);
      win.appendChild(body);
      finalizePreviewWindow(win, delay);
    });
    img.addEventListener('error', function() {
      win.remove();
    });
    return win;
  } else if (embedVideo) {
    const body = document.createElement('div');
    body.className = 'preview-body';
    const embedUrl = getEmbedUrl(embedVideo);
    if (embedUrl) {
      const iframe = document.createElement('iframe');
      iframe.src = embedUrl;
      iframe.setAttribute('allow', 'autoplay; encrypted-media');
      iframe.setAttribute('allowfullscreen', '');
      body.appendChild(iframe);
    }
    win.appendChild(body);
  } else {
    const embedUrl = getEmbedUrl(url);
    if (embedUrl) {
      const body = document.createElement('div');
      body.className = 'preview-body';
      const iframe = document.createElement('iframe');
      iframe.src = embedUrl;
      iframe.setAttribute('allow', 'autoplay; encrypted-media');
      iframe.setAttribute('allowfullscreen', '');
      body.appendChild(iframe);
      win.appendChild(body);
    }
  }

  return finalizePreviewWindow(win, delay);
}

function dismissFolder(folder) {
  const items = mediaLayer.querySelectorAll('.preview-window[data-folder="' + folder + '"]');
  items.forEach(el => {
    el.classList.remove('visible');
    el.classList.add('closing');
    el.addEventListener('transitionend', () => {
      const vid = el.querySelector('video');
      if (vid) vid.pause();
      el.remove();
    }, { once: true });
    setTimeout(() => { if (el.parentNode) el.remove(); }, 400);
  });
}

function spawnFolder(folder) {
  const entries = MEDIA_MAP[folder];
  if (!entries || entries.length === 0) return;

  // Only spawn file, link, and linkimg entries, not project
  const spawnEntries = entries.filter(e => e.type !== 'project');
  if (spawnEntries.length === 0) return;

  // Cap at 120 open windows — remove oldest first
  const MAX_WINDOWS = 120;
  const currentWindows = mediaLayer.querySelectorAll('.preview-window');
  const overflow = (currentWindows.length + spawnEntries.length) - MAX_WINDOWS;
  if (overflow > 0) {
    for (let i = 0; i < overflow && i < currentWindows.length; i++) {
      const old = currentWindows[i];
      const vid = old.querySelector('video');
      if (vid) vid.pause();
      old.remove();
    }
  }

  // Sort so linkimg spawns first (behind), everything else on top
  const sorted = spawnEntries.map((e, i) => ({ entry: e, idx: i }));
  sorted.sort((a, b) => {
    const aImg = a.entry.type === 'linkimg' ? 0 : 1;
    const bImg = b.entry.type === 'linkimg' ? 0 : 1;
    return aImg - bImg;
  });

  const winEl = document.getElementById('textedit-window');
  const rect = winEl.getBoundingClientRect();
  const placed = [];
  const positions = [];
  sorted.forEach(({ entry, idx }) => {
    const size = getEntryScatterSize(entry);
    const pos = getScatterPosition(placed, rect, size.w, size.h);
    placed.push({ ...pos, w: size.w, h: size.h });
    positions[idx] = pos;
  });

  sorted.forEach(({ entry, idx }, order) => {
    if (entry.type === 'link') {
      createLinkWindow(entry.value, folder, positions[idx], order * 120);
    } else if (entry.type === 'linkimg') {
      createLinkWindow(entry.value, folder, positions[idx], order * 120, entry.extra);
    } else if (entry.type === 'linkvideo') {
      createLinkWindow(entry.value, folder, positions[idx], order * 120, null, entry.extra);
    } else {
      createPreviewWindow(entry.value, folder, positions[idx], order * 120);
    }
  });
}

function getProjectUrl(folder) {
  const entries = MEDIA_MAP[folder];
  if (!entries) return null;
  const project = entries.find(e => e.type === 'project');
  return project ? project.value : null;
}

function isMobile() {
  return window.matchMedia('(max-width: 768px)').matches;
}

function getMobileImages(folder) {
  const entries = MEDIA_MAP[folder];
  if (!entries) return [];
  return entries
    .filter(e => e.type === 'file' && !VIDEO_EXTS.some(ext => e.value.endsWith(ext)))
    .map(e => MEDIA_BASE + '/' + folder + '/' + encodeURIComponent(e.value));
}

function spawnMobileImages(folder) {
  const area = document.getElementById('mobile-media-area');
  // Clear previous images
  area.innerHTML = '';
  const images = getMobileImages(folder);
  if (images.length === 0) return;

  const areaW = area.offsetWidth;
  const areaH = area.offsetHeight;

  images.forEach(src => {
    const img = document.createElement('img');
    img.src = src;
    // Random size between 40-70% of the area
    const scale = 0.4 + Math.random() * 0.3;
    const w = areaW * scale;
    img.style.width = w + 'px';
    img.style.height = 'auto';
    // Random position within the top half
    img.style.left = Math.random() * (areaW - w) + 'px';
    img.style.top = Math.random() * (areaH * 0.6) + 'px';
    area.appendChild(img);
  });
}

function bindTriggers() {
  document.querySelectorAll('.trigger').forEach(span => {
    span.addEventListener('mouseenter', function() {
      if (isMobile()) return;
      const folder = this.dataset.folder;
      const existing = mediaLayer.querySelectorAll('.preview-window[data-folder="' + folder + '"]');
      if (existing.length > 0) {
        existing.forEach(el => bringToFront(el));
      } else {
        spawnFolder(folder);
      }
      // Bring me.txt back to front after a moment
      setTimeout(() => {
        bringToFront(document.getElementById('textedit-window'));
      }, 1000);
    });

    span.addEventListener('click', function() {
      const folder = this.dataset.folder;
      if (isMobile()) {
        // Clear previous popups, show only the last image from the bucket
        mediaLayer.innerHTML = '';
        const entries = MEDIA_MAP[folder];
        if (entries) {
          const imageEntries = entries.filter(e =>
            e.type === 'file' && !VIDEO_EXTS.some(ext => e.value.endsWith(ext))
          );
          if (imageEntries.length > 0) {
            const last = imageEntries[imageEntries.length - 1];
            const winEl = document.getElementById('textedit-window');
            const rect = winEl.getBoundingClientRect();
            const positions = getScatterPositions(1, rect);
            createPreviewWindow(last.value, folder, positions[0], 0);
          }
        }
      }
      const projectUrl = getProjectUrl(folder);
      if (projectUrl) {
        window.open(projectUrl, '_blank');
      }
    });
  });
}

// Press window
fetch('press.txt')
  .then(r => r.text())
  .then(text => {
    const body = document.getElementById('press-body');
    const lines = text.split('\n');
    lines.forEach(line => {
      const trimmed = line.trim();
      if (!trimmed) return;
      if (trimmed === 'PRESS' || trimmed === 'AWARDS') {
        const h = document.createElement('div');
        h.className = 'press-heading';
        h.textContent = trimmed;
        body.appendChild(h);
      } else {
        const linkMatch = trimmed.match(/^\[(.+?)\]\((.+?)\)$/);
        if (linkMatch) {
          const p = document.createElement('div');
          p.style.margin = '4px 0';
          const a = document.createElement('a');
          a.href = linkMatch[2];
          a.target = '_blank';
          a.textContent = linkMatch[1];
          p.appendChild(a);
          body.appendChild(p);
        } else {
          const p = document.createElement('div');
          p.className = 'award-line';
          p.textContent = trimmed;
          body.appendChild(p);
        }
      }
    });
  });

document.getElementById('press-close').addEventListener('click', function() {
  document.getElementById('press-window').style.display = 'none';
});
</script>
